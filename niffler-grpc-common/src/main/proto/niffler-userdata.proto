syntax = "proto3";

import "google/protobuf/empty.proto";


package guru.qa.grpc.niffler;

option java_multiple_files = true;
option java_package = "guru.qa.niffler.grpc";
option java_outer_classname = "NifflerUserdataProto";

service NifflerUserdataService {
  rpc GetUser(UsernameRequest) returns (UserResponse) {}
  rpc GetAllUser(UsersRequest) returns (stream UserResponse) {}   //List<UserJsonBulk> allUsers(String username, String searchQuery)
  rpc GetAllPage(UsersRequest) returns (stream UserResponse) {}    // Page<UserJsonBulk> allUsers(String username, Pageable pageable, String searchQuery)
  rpc UpdateUser(UserRequest) returns (UserResponse) {}

  rpc GetAllFriends(FriendRequest) returns (stream UserResponse) {}
  rpc acceptFriendshipRequest(FriendshipRequest) returns (UserResponse) {}
  rpc declineFriendshipRequest(FriendshipRequest) returns (UserResponse) {}
  rpc removeFriend(FriendshipRequest) returns(google.protobuf.Empty) {}
}


//  UserJson getCurrentUser(String username)
//  List<UserJsonBulk> allUsers(String username, String searchQuery)
//  Page<UserJsonBulk> allUsers(String username, Pageable pageable, String searchQuery)
//  List<UserJsonBulk> friends(String username, String searchQuery)
//  UserJson update(UserJson user)
//UserJson createFriendshipRequest(String username, String targetUsername)
//  UserJson acceptFriendshipRequest(String username, String targetUsername)
//  UserJson declineFriendshipRequest(String username, String targetUsername)
//  void removeFriend(String username, String targetUsername)

message UsernameRequest {
  string username = 1;
}

message UserRequest {
  string username = 1;
  string searchQuery = 2;
}

message UsersRequest {
  string username = 1;
  string searchQuery = 2;
}

message FriendRequest {
  string username = 1;
  string searchQuery = 2;
}

message FriendshipRequest {
  string username = 1;
  string targetUsername = 2;
}

message UserResponse {
  string id = 1;
  string username = 2;
  string firstname = 3;
  string surname =4;

//  CurrencyValues currency =5;
//  String photo = 5;
//  String photoSmall();
//  FriendshipStatus friendshipStatus();
}
